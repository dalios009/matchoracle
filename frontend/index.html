<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#080C14">
<title>MatchOracle</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ── Reset & Tokens ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080C14;--surface:#0E1520;--card:#141C2B;--border:#1E2D45;
  --accent:#00E5A0;--accent2:#FF6B35;--accent3:#4E9FFF;
  --gold:#FFD166;--text:#EEF2FF;--muted:#5A6A85;
  --danger:#FF4757;--green:#2ECC71;
  --radius:14px;--radius-sm:10px;
  --transition:0.22s cubic-bezier(.4,0,.2,1);
}
html{font-size:16px}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  min-height:100vh;overflow-x:hidden;
  /* Telegram safe areas */
  padding-bottom:env(safe-area-inset-bottom);
}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── Scrollbar ──────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(–border);border-radius:2px}

/* ── Typography ─────────────────────────────────────────────── */
.text-muted{color:var(–muted)}
.text-accent{color:var(–accent)}
.text-mono{font-variant-numeric:tabular-nums;font-feature-settings:“tnum”}

/* ── Header ─────────────────────────────────────────────────── */
.header{
position:sticky;top:0;z-index:200;
background:rgba(8,12,20,.94);backdrop-filter:blur(18px);
border-bottom:1px solid var(–border);
padding:12px 16px;
display:flex;align-items:center;justify-content:space-between;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
width:34px;height:34px;border-radius:9px;
background:linear-gradient(135deg,var(–accent),var(–accent3));
display:flex;align-items:center;justify-content:center;
font-size:17px;flex-shrink:0;
}
.logo-name{font-size:17px;font-weight:800;letter-spacing:.3px}
.logo-tag{font-size:9px;color:var(–accent);letter-spacing:2.5px;text-transform:uppercase;margin-top:-3px}
.live-pill{
display:flex;align-items:center;gap:5px;
background:rgba(255,71,87,.12);border:1px solid rgba(255,71,87,.25);
border-radius:20px;padding:4px 10px;
font-size:11px;font-weight:700;color:var(–danger);
}
.live-dot{width:6px;height:6px;background:var(–danger);border-radius:50%;animation:blink 1.4s infinite}

/* ── Main ───────────────────────────────────────────────────── */
.main{padding:16px;max-width:480px;margin:0 auto}

/* ── Pages ──────────────────────────────────────────────────── */
.page{display:none;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── Date Strip ─────────────────────────────────────────────── */
.date-strip{
display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;
scrollbar-width:none;margin-bottom:18px;
}
.date-strip::-webkit-scrollbar{display:none}
.date-btn{
flex-shrink:0;min-width:56px;
display:flex;flex-direction:column;align-items:center;
padding:9px 10px;
background:var(–card);border:1px solid var(–border);
border-radius:12px;cursor:pointer;transition:all var(–transition);
user-select:none;
}
.date-btn.active{background:rgba(0,229,160,.1);border-color:var(–accent)}
.date-day{font-size:10px;color:var(–muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.date-num{font-size:22px;font-weight:800;line-height:1.1;margin:2px 0}
.date-count{font-size:10px;color:var(–accent);font-weight:700;min-height:14px}
.date-btn.active .date-day,.date-btn.active .date-count{color:var(–accent)}

/* ── Section Label ──────────────────────────────────────────── */
.section-label{
display:flex;align-items:center;gap:8px;
font-size:10px;font-weight:800;text-transform:uppercase;
letter-spacing:2px;color:var(–muted);margin-bottom:11px;
}
.section-label::after{content:’’;flex:1;height:1px;background:linear-gradient(to right,var(–border),transparent)}

/* ── League Pills ───────────────────────────────────────────── */
.league-scroll{
display:flex;gap:7px;overflow-x:auto;
padding-bottom:2px;scrollbar-width:none;margin-bottom:18px;
}
.league-scroll::-webkit-scrollbar{display:none}
.league-pill{
flex-shrink:0;padding:5px 13px;
background:var(–card);border:1px solid var(–border);
border-radius:20px;font-size:12px;font-weight:600;
cursor:pointer;transition:all var(–transition);white-space:nowrap;color:var(–muted);
}
.league-pill.active{background:rgba(0,229,160,.1);border-color:var(–accent);color:var(–accent)}

/* ── Skeleton ───────────────────────────────────────────────── */
.skeleton{
background:linear-gradient(90deg,var(–card) 25%,var(–surface) 50%,var(–card) 75%);
background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;
}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton-card{height:110px;border-radius:var(–radius);margin-bottom:11px}

/* ── Match Card ─────────────────────────────────────────────── */
.match-card{
background:var(–card);border:1px solid var(–border);
border-radius:var(–radius);margin-bottom:11px;
overflow:hidden;cursor:pointer;
transition:border-color var(–transition),box-shadow var(–transition);
will-change:transform;
}
.match-card:active{opacity:.9}
.match-card.expanded{border-color:rgba(0,229,160,.35)}
.match-meta{
display:flex;align-items:center;justify-content:space-between;
padding:6px 13px;
background:rgba(255,255,255,.02);border-bottom:1px solid var(–border);
gap:8px;
}
.match-league{
font-size:10px;font-weight:700;color:var(–muted);
text-transform:uppercase;letter-spacing:.8px;
display:flex;align-items:center;gap:5px;
flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.match-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.conf-tag{font-size:11px;font-weight:700}
.match-time-tag{
font-size:11px;font-weight:700;color:var(–accent);
font-variant-numeric:tabular-nums;
}
.live-tag{
font-size:10px;font-weight:800;color:var(–danger);
background:rgba(255,71,87,.12);border-radius:5px;
padding:2px 6px;letter-spacing:.5px;
animation:blink 1.4s infinite;
}

.match-body{padding:13px}
.teams{display:flex;align-items:center;justify-content:space-between;gap:6px}
.team{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;min-width:0}
.team-badge{
width:44px;height:44px;border-radius:50%;
background:var(–surface);border:1.5px solid var(–border);
display:flex;align-items:center;justify-content:center;
overflow:hidden;flex-shrink:0;
}
.team-badge img{width:32px;height:32px;object-fit:contain}
.team-badge-fallback{font-size:20px}
.team-name{
font-size:12px;font-weight:700;text-align:center;
line-height:1.2;max-width:90px;
overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.team-form{display:flex;gap:3px;margin-top:1px}
.form-dot{width:7px;height:7px;border-radius:50%}
.form-W{background:var(–green)}
.form-D{background:var(–gold)}
.form-L{background:var(–danger)}

.vs-col{text-align:center;flex-shrink:0}
.vs-label{font-size:13px;font-weight:900;color:var(–muted);letter-spacing:1px}
.score-pred{
font-size:13px;font-weight:800;color:var(–accent);
background:rgba(0,229,160,.09);border:1px solid rgba(0,229,160,.18);
border-radius:7px;padding:3px 9px;margin-top:5px;
font-variant-numeric:tabular-nums;
}
.score-live{
font-size:15px;font-weight:900;color:var(–danger);
background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.25);
border-radius:7px;padding:3px 9px;margin-top:5px;
}

/* ── Expand Panel ───────────────────────────────────────────── */
.expand-panel{
max-height:0;overflow:hidden;
transition:max-height .38s cubic-bezier(.4,0,.2,1);
border-top:0 solid var(–border);
}
.match-card.expanded .expand-panel{
max-height:1100px;border-top-width:1px;
}
.expand-inner{padding:14px}

/* ── Outcome Bars ───────────────────────────────────────────── */
.outcome-bars{margin-bottom:14px}
.outcome-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.outcome-lbl{font-size:11px;font-weight:800;min-width:18px;text-align:center}
.outcome-wrap{flex:1;height:8px;background:var(–surface);border-radius:4px;overflow:hidden}
.outcome-bar{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1);width:0}
.bar-h{background:linear-gradient(to right,var(–accent3),rgba(78,159,255,.5))}
.bar-d{background:linear-gradient(to right,var(–gold),rgba(255,209,102,.5))}
.bar-a{background:linear-gradient(to right,var(–accent2),rgba(255,107,53,.5))}
.outcome-pct{font-size:11px;font-variant-numeric:tabular-nums;min-width:34px;text-align:right;color:var(–muted);font-weight:600}

/* ── Conf Bar ───────────────────────────────────────────────── */
.conf-section{margin-bottom:14px}
.conf-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:10px;font-weight:700;color:var(–muted);text-transform:uppercase;letter-spacing:.5px}
.conf-pct{font-size:14px;color:var(–accent);font-variant-numeric:tabular-nums}
.conf-bar{height:5px;background:var(–surface);border-radius:3px;overflow:hidden}
.conf-fill{height:100%;border-radius:3px;background:linear-gradient(to right,var(–accent3),var(–accent));transition:width .7s cubic-bezier(.4,0,.2,1);width:0}

/* ── Stats Row ──────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.stat-box{background:var(–surface);border:1px solid var(–border);border-radius:9px;padding:9px 7px;text-align:center}
.stat-val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:9px;color:var(–muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

/* ── Best Bets ──────────────────────────────────────────────── */
.bets-label{font-size:10px;font-weight:800;color:var(–muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:9px}
.bets-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.bet-chip{
background:var(–surface);border:1px solid var(–border);
border-radius:11px;padding:9px 11px;
cursor:pointer;transition:all var(–transition);
position:relative;user-select:none;
}
.bet-chip:active{transform:scale(.97)}
.bet-chip.selected{background:rgba(0,229,160,.1);border-color:var(–accent)}
.bet-chip.selected::after{
content:‘✓’;position:absolute;top:6px;right:8px;
color:var(–accent);font-size:11px;font-weight:800;
}
.bet-market{font-size:10px;color:var(–muted);font-weight:600;margin-bottom:3px}
.bet-value{font-size:12px;font-weight:700;margin-bottom:4px;padding-right:14px;line-height:1.2}
.bet-bar-row{display:flex;align-items:center;gap:5px}
.bet-bar-wrap{flex:1;height:3px;background:var(–border);border-radius:2px;overflow:hidden}
.bet-bar-fill{height:100%;border-radius:2px}
.prob-high{background:var(–green)}
.prob-med{background:var(–gold)}
.prob-low{background:var(–accent2)}
.bet-pct{font-size:10px;font-weight:700;font-variant-numeric:tabular-nums}

/* ── Insights ───────────────────────────────────────────────── */
.insights-label{font-size:10px;font-weight:800;color:var(–muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.insight-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;font-size:12px;line-height:1.5;color:rgba(238,242,255,.78)}
.insight-icon{font-size:13px;flex-shrink:0;margin-top:1px}

/* ── News Ticker ────────────────────────────────────────────── */
.news-box{
background:rgba(78,159,255,.07);border:1px solid rgba(78,159,255,.18);
border-radius:9px;padding:9px 11px;margin-top:8px;
font-size:11px;color:var(–accent3);line-height:1.5;
}
.news-box strong{color:var(–text);font-weight:700}

/* ── AI Analysis Panel ──────────────────────────────────────── */
.ai-panel{
background:rgba(0,229,160,.05);border:1px solid rgba(0,229,160,.15);
border-radius:10px;padding:11px;margin-top:11px;
font-size:12px;line-height:1.6;display:none;
}
.ai-panel.visible{display:block}
.ai-panel-loading{color:var(–muted)}

/* ── Buttons ────────────────────────────────────────────────── */
.btn{
display:flex;align-items:center;justify-content:center;gap:7px;
width:100%;padding:13px;border-radius:11px;
font-size:13px;font-weight:700;cursor:pointer;
transition:all var(–transition);border:none;
font-family:inherit;
}
.btn:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,var(–accent3),var(–accent));color:#000}
.btn-primary:hover{box-shadow:0 6px 22px rgba(0,229,160,.22)}
.btn-outline{background:transparent;border:1px solid var(–border);color:var(–text)}
.btn-outline:hover{border-color:var(–accent);color:var(–accent)}
.btn.loading{opacity:.7;pointer-events:none}
.btn-spinner{
width:15px;height:15px;
border:2px solid rgba(0,0,0,.25);border-top-color:#000;
border-radius:50%;animation:spin .65s linear infinite;display:none;
}
.btn.loading .btn-spinner{display:block}
.btn.loading .btn-txt{opacity:.75}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Bottom Nav ─────────────────────────────────────────────── */
.bottom-nav{
position:fixed;bottom:0;left:0;right:0;z-index:200;
background:rgba(8,12,20,.95);backdrop-filter:blur(18px);
border-top:1px solid var(–border);
display:flex;
padding-bottom:max(10px,env(safe-area-inset-bottom));
}
.nav-item{
flex:1;display:flex;flex-direction:column;align-items:center;
gap:3px;cursor:pointer;padding:10px 0 6px;
font-size:10px;font-weight:700;text-transform:uppercase;
letter-spacing:.5px;color:var(–muted);
transition:color var(–transition);
}
.nav-item.active{color:var(–accent)}
.nav-icon{font-size:21px;line-height:1}
.nav-badge{
position:absolute;top:7px;right:calc(50% - 14px);
width:16px;height:16px;background:var(–accent);
border-radius:50%;color:#000;font-size:9px;font-weight:800;
display:none;align-items:center;justify-content:center;
}
.nav-badge.show{display:flex}

/* ── Betslip Bar ────────────────────────────────────────────── */
.betslip-bar{
position:fixed;bottom:68px;left:14px;right:14px;z-index:190;
background:var(–card);border:1px solid var(–accent);
border-radius:13px;padding:11px 15px;
display:flex;align-items:center;justify-content:space-between;
transform:translateY(130px);transition:transform var(–transition);
box-shadow:0 -6px 36px rgba(0,229,160,.13);
}
.betslip-bar.visible{transform:translateY(0)}
.betslip-info{font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px}
.betslip-count{
width:20px;height:20px;background:var(–accent);color:#000;
border-radius:50%;font-size:10px;font-weight:800;
display:flex;align-items:center;justify-content:center;
}
.betslip-btn{
background:var(–accent);color:#000;
border-radius:8px;padding:7px 15px;
font-size:12px;font-weight:800;font-family:inherit;
}

/* ── Scroll Pad ─────────────────────────────────────────────── */
.scroll-pad{height:130px}

/* ── Toast ──────────────────────────────────────────────────── */
.toast{
position:fixed;top:68px;left:50%;
transform:translateX(-50%) translateY(-80px);
background:var(–card);border:1px solid var(–accent);
border-radius:9px;padding:9px 17px;
font-size:12px;font-weight:600;color:var(–accent);
z-index:999;transition:transform .28s cubic-bezier(.4,0,.2,1);
white-space:nowrap;pointer-events:none;
box-shadow:0 4px 18px rgba(0,229,160,.18);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── Saved Betslips ─────────────────────────────────────────── */
.saved-card{
background:var(–card);border:1px solid var(–border);
border-radius:var(–radius);padding:13px;margin-bottom:11px;
}
.saved-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.saved-title{font-size:13px;font-weight:700}
.saved-status{
font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;
background:rgba(78,159,255,.12);color:var(–accent3);
}
.saved-date{font-size:10px;color:var(–muted);margin-bottom:8px}
.saved-legs{display:flex;flex-direction:column;gap:5px}
.saved-leg{
background:var(–surface);border:1px solid var(–border);
border-radius:7px;padding:6px 10px;
font-size:11px;line-height:1.4;
}
.saved-leg strong{font-weight:700;color:var(–text)}
.saved-leg span{color:var(–muted)}

/* ── AI Scout Page ──────────────────────────────────────────── */
.scout-box{
background:var(–card);border:1px solid var(–border);
border-radius:var(–radius);padding:13px;margin-bottom:13px;
}
.scout-textarea{
width:100%;background:var(–surface);border:1px solid var(–border);
border-radius:9px;padding:11px 13px;color:var(–text);
font-family:inherit;font-size:13px;resize:none;outline:none;
transition:border-color var(–transition);height:78px;line-height:1.5;
}
.scout-textarea:focus{border-color:var(–accent)}
.scout-textarea::placeholder{color:var(–muted)}
.scout-response{
background:var(–surface);border:1px solid var(–border);
border-radius:9px;padding:13px;font-size:13px;line-height:1.65;
min-height:70px;margin-top:11px;color:rgba(238,242,255,.88);
}
.scout-response.empty{color:var(–muted);font-size:12px}
.quick-btns{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.quick-btn{
background:var(–surface);border:1px solid var(–border);
border-radius:20px;padding:5px 12px;
font-size:11px;font-weight:600;color:var(–muted);
cursor:pointer;transition:all var(–transition);font-family:inherit;
}
.quick-btn:hover,.quick-btn:active{border-color:var(–accent);color:var(–accent)}

/* ── Empty State ────────────────────────────────────────────── */
.empty{text-align:center;padding:52px 20px;color:var(–muted)}
.empty-icon{font-size:44px;margin-bottom:11px}
.empty-text{font-size:13px;line-height:1.5}

/* ── Error Banner ───────────────────────────────────────────── */
.error-banner{
background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.25);
border-radius:10px;padding:11px 13px;margin-bottom:14px;
font-size:12px;color:var(–danger);display:flex;align-items:center;gap:8px;
}

/* ── Animations ─────────────────────────────────────────────── */
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.card-in{animation:cardIn .3s ease forwards}

/* ── Powered tag ────────────────────────────────────────────── */
.powered{text-align:center;font-size:10px;color:var(–muted);margin-top:6px}
.powered span{color:var(–accent);font-weight:700}
</style>

</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->

<header class="header">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-name">MatchOracle</div>
      <div class="logo-tag">AI Scout</div>
    </div>
  </div>
  <div class="live-pill"><div class="live-dot"></div>LIVE</div>
</header>

<!-- ── Toast ───────────────────────────────────────────────── -->

<div id="toast" class="toast" aria-live="polite"></div>

<!-- ══════════════════ PAGE: MATCHES ═══════════════════════ -->

<div id="page-matches" class="page active">
  <div class="main">
    <div class="date-strip" id="dateStrip"></div>
    <div class="section-label">Leagues</div>
    <div class="league-scroll" id="leagueScroll"></div>
    <div class="section-label">Fixtures</div>
    <div id="errorBanner"></div>
    <div id="matchList"></div>
    <div class="scroll-pad"></div>
  </div>
</div>

<!-- ══════════════════ PAGE: SAVED ═════════════════════════ -->

<div id="page-saved" class="page">
  <div class="main">
    <div class="section-label">My Betslip</div>
    <div id="savedList"></div>
    <div class="scroll-pad"></div>
  </div>
</div>

<!-- ══════════════════ PAGE: AI SCOUT ══════════════════════ -->

<div id="page-ai" class="page">
  <div class="main">
    <div class="section-label">AI Scout</div>
    <div class="scout-box">
      <textarea class="scout-textarea" id="scoutInput"
        placeholder="Ask anything… e.g. 'Best BTTS picks today?' or 'Is Dortmund a value bet?'"></textarea>
      <button class="btn btn-primary" id="scoutBtn" onclick="submitScout()" style="margin-top:8px">
        <div class="btn-spinner" id="scoutSpinner"></div>
        <span class="btn-txt">🤖 Ask Scout</span>
      </button>
      <div class="quick-btns" id="quickBtns"></div>
    </div>
    <div class="scout-response empty" id="scoutResponse">
      Your AI scout is ready. Ask about any match, team, or market.
    </div>

<script>
// ── Runtime Config ──────────────────────────────────────────
// Replaced by env at deploy time, or set window.MATCHORACLE_API
// e.g. in Vercel: add _headers or inject via edge middleware
window.MATCHORACLE_CONFIG = window.MATCHORACLE_CONFIG || {
  apiBase: 'matchoracle-production-3fae.up.railway.app
'
};
</script>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
// CONFIG — set window.MATCHORACLE_CONFIG.apiBase before this script
// or edit this line directly after deploying your backend
// ═══════════════════════════════════════════════════════════════
const API_BASE = (window.MATCHORACLE_CONFIG?.apiBase || 'https://YOUR_BACKEND.vercel.app/api');

const LEAGUES = [
  { key:'all', label:'🌍 All' },
  { key:'pl',  label:'🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League' },
  { key:'cl',  label:'⭐ UCL' },
  { key:'ll',  label:'🇪🇸 La Liga' },
  { key:'bl',  label:'🇩🇪 Bundesliga' },
  { key:'sa',  label:'🇮🇹 Serie A' },
  { key:'l1',  label:'🇫🇷 Ligue 1' },
];

const QUICK_QUESTIONS = [
  'Best value bets today?',
  'Top BTTS picks?',
  'Safest home wins?',
  'Best Over 2.5 games?',
];

// ═══════════════════════════════════════════════════════════════
// TELEGRAM SDK
// ═══════════════════════════════════════════════════════════════
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.ready(); }
const haptic = {
  impact: (s='light') => tg?.HapticFeedback?.impactOccurred(s),
  notify: (t='success') => tg?.HapticFeedback?.notificationOccurred(t),
  select: () => tg?.HapticFeedback?.selectionChanged(),
};

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const state = {
  activePage: 'matches',
  activeDate: todayISO(),
  activeLeague: 'all',
  fixtures: [],
  fixturesLoading: false,
  fixturesError: null,
  predictions: {},      // { [fixtureId]: prediction }
  predLoading: {},      // { [fixtureId]: bool }
  expandedId: null,
  aiAnalysis: {},       // { [fixtureId]: { analysis, generatedAt } }
  aiLoading: {},        // { [fixtureId]: bool }
  selectedBets: {},     // { key: { fixtureId, market, value, prob } }
  savedBetslips: JSON.parse(localStorage.getItem('mo_betslips') || '[]'),
};

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
function todayISO() {
  return new Date().toISOString().split('T')[0];
}
function isoForOffset(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().split('T')[0];
}
function fmtDayLabel(offset) {
  if (offset === 0) return 'Today';
  if (offset === -1) return 'Yest';
  if (offset === 1) return 'Tmrw';
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toLocaleDateString('en-GB', { weekday: 'short' });
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

function tierColor(prob) {
  return prob >= 65 ? 'var(--green)' : prob >= 48 ? 'var(--gold)' : 'var(--accent2)';
}
function probClass(prob) {
  return prob >= 65 ? 'prob-high' : prob >= 48 ? 'prob-med' : 'prob-low';
}

// ═══════════════════════════════════════════════════════════════
// API LAYER
// ═══════════════════════════════════════════════════════════════
async function apiFetch(path, options = {}) {
  const res = await fetch(`${API_BASE}${path}`, {
    headers: { 'Content-Type': 'application/json' },
    ...options,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function fetchFixtures(date, league) {
  const p = new URLSearchParams({ date });
  if (league && league !== 'all') p.set('league', league);
  return apiFetch(`/matches?${p}`);
}

async function fetchPrediction(fixture) {
  return apiFetch('/predictions', {
    method: 'POST',
    body: JSON.stringify({
      fixtureId: fixture.id,
      homeId: fixture.home.id,
      awayId: fixture.away.id,
    }),
  });
}

async function fetchAIAnalysis(fixtureId) {
  return apiFetch('/ai/analyse', {
    method: 'POST',
    body: JSON.stringify({ fixtureId }),
  });
}

async function fetchScout(question) {
  return apiFetch('/ai/scout', {
    method: 'POST',
    body: JSON.stringify({ question }),
  });
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  buildDateStrip();
  buildLeagueFilter();
  buildQuickBtns();
  loadFixtures();
});

// ═══════════════════════════════════════════════════════════════
// DATE STRIP
// ═══════════════════════════════════════════════════════════════
function buildDateStrip() {
  const strip = document.getElementById('dateStrip');
  strip.innerHTML = '';
  const offsets = [-1, 0, 1, 2, 3, 4, 5];
  offsets.forEach(offset => {
    const iso = isoForOffset(offset);
    const d = new Date(); d.setDate(d.getDate() + offset);
    const btn = document.createElement('div');
    btn.className = 'date-btn' + (iso === state.activeDate ? ' active' : '');
    btn.dataset.iso = iso;
    btn.innerHTML = `
      <div class="date-day">${fmtDayLabel(offset)}</div>
      <div class="date-num">${d.getDate()}</div>
      <div class="date-count" id="dc-${iso}">–</div>`;
    btn.addEventListener('click', () => {
      haptic.select();
      state.activeDate = iso;
      document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadFixtures();
    });
    strip.appendChild(btn);
  });
}

function updateDateCount(iso, count) {
  const el = document.getElementById(`dc-${iso}`);
  if (el) el.textContent = count > 0 ? `${count}m` : '–';
}

// ═══════════════════════════════════════════════════════════════
// LEAGUE FILTER
// ═══════════════════════════════════════════════════════════════
function buildLeagueFilter() {
  const scroll = document.getElementById('leagueScroll');
  scroll.innerHTML = LEAGUES.map(l => `
    <div class="league-pill${l.key === state.activeLeague ? ' active' : ''}"
         data-key="${l.key}"
         onclick="setLeague('${l.key}',this)">${l.label}</div>
  `).join('');
}

function setLeague(key, el) {
  haptic.select();
  state.activeLeague = key;
  document.querySelectorAll('.league-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderMatchList();
}

// ═══════════════════════════════════════════════════════════════
// LOAD FIXTURES
// ═══════════════════════════════════════════════════════════════
async function loadFixtures() {
  state.fixturesLoading = true;
  state.fixturesError = null;
  renderMatchList(); // show skeletons

  try {
    const data = await fetchFixtures(state.activeDate, 'all');
    state.fixtures = data.fixtures || [];
    updateDateCount(state.activeDate, state.fixtures.length);
  } catch (err) {
    state.fixturesError = err.message;
    // fallback to demo data when backend isn't live yet
    state.fixtures = getDemoFixtures();
    updateDateCount(state.activeDate, state.fixtures.length);
  } finally {
    state.fixturesLoading = false;
    renderMatchList();
    // Auto-fetch predictions for visible fixtures (up to 8)
    state.fixtures.slice(0, 8).forEach(f => {
      if (!state.predictions[f.id]) loadPrediction(f);
    });
  }
}

async function loadPrediction(fixture) {
  if (state.predLoading[fixture.id] || state.predictions[fixture.id]) return;
  state.predLoading[fixture.id] = true;

  try {
    const pred = await fetchPrediction(fixture);
    state.predictions[fixture.id] = pred;
    updateCardPrediction(fixture.id, pred);
  } catch {
    // Prediction failed silently — card shows without prediction
  } finally {
    state.predLoading[fixture.id] = false;
  }
}

// ═══════════════════════════════════════════════════════════════
// RENDER MATCH LIST
// ═══════════════════════════════════════════════════════════════
function renderMatchList() {
  const list = document.getElementById('matchList');
  const errorBanner = document.getElementById('errorBanner');

  // Error banner (non-blocking)
  if (state.fixturesError) {
    errorBanner.innerHTML = `<div class="error-banner">⚠️ Using demo data — connect backend to see live fixtures.</div>`;
  } else {
    errorBanner.innerHTML = '';
  }

  // Loading skeletons
  if (state.fixturesLoading) {
    list.innerHTML = Array(5).fill('<div class="skeleton skeleton-card"></div>').join('');
    return;
  }

  // Filter by league
  let fixtures = state.fixtures;
  if (state.activeLeague !== 'all') {
    fixtures = fixtures.filter(f => f.leagueKey === state.activeLeague);
  }

  if (fixtures.length === 0) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">📭</div>
      <div class="empty-text">No fixtures found<br>for this selection.</div>
    </div>`;
    return;
  }

  list.innerHTML = fixtures.map((f, i) => buildMatchCard(f, i)).join('');
}

// ═══════════════════════════════════════════════════════════════
// MATCH CARD HTML
// ═══════════════════════════════════════════════════════════════
function buildMatchCard(f, animIdx = 0) {
  const pred = state.predictions[f.id];
  const isLive = ['1H','HT','2H','ET','P'].includes(f.status);
  const isExpanded = state.expandedId === f.id;

  const confPct = pred ? pred.confidence : null;
  const confColor = confPct
    ? (confPct >= 68 ? 'var(--green)' : confPct >= 52 ? 'var(--gold)' : 'var(--accent2)')
    : 'var(--muted)';

  // Team badge — use logo if available, else emoji fallback
  const homeBadge = f.home.logo
    ? `<img src="${f.home.logo}" alt="${f.home.name}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='block'">`
    : '';
  const awayBadge = f.away.logo
    ? `<img src="${f.away.logo}" alt="${f.away.name}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='block'">`
    : '';

  // Form dots
  const formDots = (form = []) => form.slice(-5).map(r =>
    `<div class="form-dot form-${r}"></div>`).join('');

  // Score display
  const scoreDisplay = isLive
    ? `<div class="score-live">${f.goals.home ?? 0} – ${f.goals.away ?? 0}</div>`
    : pred
      ? `<div class="score-pred">${pred.score}</div>`
      : `<div class="score-pred" style="color:var(--muted)">?–?</div>`;

  // Expand panel content
  const expandContent = pred ? buildExpandPanel(f, pred) : `
    <div class="expand-inner">
      <div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">
        Loading prediction…
      </div>
    </div>`;

  return `
<div class="match-card${isExpanded ? ' expanded' : ''} card-in"
     id="card-${f.id}"
     style="animation-delay:${animIdx * 55}ms"
     onclick="toggleCard(${f.id})">
  <div class="match-meta">
    <div class="match-league">${f.leagueFlag || '⚽'} ${f.leagueName}</div>
    <div class="match-right">
      ${confPct ? `<span class="conf-tag" style="color:${confColor}">${confPct}% 🎯</span>` : ''}
      ${isLive
        ? `<span class="live-tag">${f.elapsed ? f.elapsed+"'" : 'LIVE'}</span>`
        : `<span class="match-time-tag">${f.time}</span>`}
    </div>
  </div>
  <div class="match-body">
    <div class="teams">
      <div class="team">
        <div class="team-badge">
          ${homeBadge}<div class="team-badge-fallback"${homeBadge ? ' style="display:none"' : ''}>🏠</div>
        </div>
        <div class="team-name">${f.home.name}</div>
        <div class="team-form" id="hform-${f.id}">${formDots(f.homeForm || [])}</div>
      </div>
      <div class="vs-col">
        <div class="vs-label">VS</div>
        ${scoreDisplay}
      </div>
      <div class="team">
        <div class="team-badge">
          ${awayBadge}<div class="team-badge-fallback"${awayBadge ? ' style="display:none"' : ''}>✈️</div>
        </div>
        <div class="team-name">${f.away.name}</div>
        <div class="team-form" id="aform-${f.id}">${formDots(f.awayForm || [])}</div>
      </div>
    </div>
  </div>
  <div class="expand-panel" id="panel-${f.id}">
    <div id="epinner-${f.id}">${expandContent}</div>
  </div>
</div>`;
}

function buildExpandPanel(fixture, pred) {
  const p = pred.probabilities;
  const aiData = state.aiAnalysis[fixture.id];

  const betChips = (pred.bestBets || []).slice(0, 6).map((b, bi) => {
    const bKey = `${fixture.id}-${bi}`;
    const sel = !!state.selectedBets[bKey];
    return `
<div class="bet-chip${sel ? ' selected' : ''}"
     onclick="toggleBet(event,'${bKey}',${fixture.id},'${escHtml(b.market)}','${escHtml(b.value)}',${b.prob})">
  <div class="bet-market">${b.market}</div>
  <div class="bet-value">${b.value}</div>
  <div class="bet-bar-row">
    <div class="bet-bar-wrap">
      <div class="bet-bar-fill ${probClass(b.prob)}" style="width:${b.prob}%"></div>
    </div>
    <div class="bet-pct" style="color:${tierColor(b.prob)}">${b.prob}%</div>
  </div>
</div>`;
  }).join('');

  const insights = (pred.insights || []).map(ins =>
    `<div class="insight-row"><div class="insight-icon">${ins.icon}</div><div>${ins.text}</div></div>`
  ).join('');

  const aiSection = aiData
    ? `<div class="ai-panel visible">🤖 <strong>AI Scout:</strong> ${escHtml(aiData.analysis)}</div>`
    : `<div class="ai-panel" id="aipanel-${fixture.id}"></div>`;

  return `
<div class="expand-inner">
  <!-- Confidence -->
  <div class="conf-section">
    <div class="conf-head">
      <span>Prediction Confidence</span>
      <span class="conf-pct">${pred.confidence}%</span>
    </div>
    <div class="conf-bar">
      <div class="conf-fill" id="cfill-${fixture.id}" style="width:${pred.confidence}%"></div>
    </div>
  </div>

  <!-- 1X2 Bars -->
  <div class="outcome-bars">
    <div class="outcome-row">
      <div class="outcome-lbl">1</div>
      <div class="outcome-wrap"><div class="outcome-bar bar-h" style="width:${p.home}%"></div></div>
      <div class="outcome-pct">${p.home}%</div>
    </div>
    <div class="outcome-row">
      <div class="outcome-lbl">X</div>
      <div class="outcome-wrap"><div class="outcome-bar bar-d" style="width:${p.draw}%"></div></div>
      <div class="outcome-pct">${p.draw}%</div>
    </div>
    <div class="outcome-row">
      <div class="outcome-lbl">2</div>
      <div class="outcome-wrap"><div class="outcome-bar bar-a" style="width:${p.away}%"></div></div>
      <div class="outcome-pct">${p.away}%</div>
    </div>
  </div>

  <!-- xG Stats -->
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-val" style="color:var(--accent3)">${pred.xG?.home ?? '?'}</div>
      <div class="stat-lbl">Home xG</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" style="color:var(--gold)">${pred.score}</div>
      <div class="stat-lbl">Predicted</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" style="color:var(--accent2)">${pred.xG?.away ?? '?'}</div>
      <div class="stat-lbl">Away xG</div>
    </div>
  </div>

  <!-- Best Bets -->
  <div class="bets-label">📌 Best Bets</div>
  <div class="bets-grid">${betChips}</div>

  <!-- Scout Insights -->
  ${insights ? `<div class="insights-label">🔍 Scout Report</div>${insights}` : ''}

  <!-- AI Deep Analysis -->
  <button class="btn btn-outline" id="aibtn-${fixture.id}"
          onclick="requestAIAnalysis(event,${fixture.id})"
          style="margin-top:12px">
    <div class="btn-spinner" id="aispin-${fixture.id}"></div>
    <span class="btn-txt">✨ Deep AI Analysis</span>
  </button>
  ${aiSection}
  <div class="powered">Powered by <span>MatchOracle AI</span></div>
</div>`;
}

// Update a card in-place when prediction arrives (no full re-render)
function updateCardPrediction(fixtureId, pred) {
  const card = document.getElementById(`card-${fixtureId}`);
  if (!card) return;

  // Update confidence tag
  const confTag = card.querySelector('.conf-tag');
  const confColor = pred.confidence >= 68 ? 'var(--green)' : pred.confidence >= 52 ? 'var(--gold)' : 'var(--accent2)';
  if (confTag) {
    confTag.style.color = confColor;
    confTag.textContent = `${pred.confidence}% 🎯`;
  }

  // Update score prediction
  const scorePred = card.querySelector('.score-pred');
  if (scorePred) scorePred.textContent = pred.score;

  // If card is expanded, replace expand panel content
  if (state.expandedId === fixtureId) {
    const fixture = state.fixtures.find(f => f.id === fixtureId);
    if (fixture) {
      document.getElementById(`epinner-${fixtureId}`).innerHTML = buildExpandPanel(fixture, pred);
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// CARD TOGGLE
// ═══════════════════════════════════════════════════════════════
function toggleCard(fixtureId) {
  haptic.impact('light');
  const wasExpanded = state.expandedId === fixtureId;

  // Collapse previous
  if (state.expandedId) {
    const prev = document.getElementById(`card-${state.expandedId}`);
    if (prev) prev.classList.remove('expanded');
  }

  state.expandedId = wasExpanded ? null : fixtureId;

  if (!wasExpanded) {
    const card = document.getElementById(`card-${fixtureId}`);
    if (card) {
      card.classList.add('expanded');
      // If prediction not yet loaded, load it now
      const fixture = state.fixtures.find(f => f.id === fixtureId);
      if (fixture && !state.predictions[fixtureId]) {
        loadPrediction(fixture);
      }
      setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// BET SELECTION
// ═══════════════════════════════════════════════════════════════
function toggleBet(event, key, fixtureId, market, value, prob) {
  event.stopPropagation();
  haptic.impact('medium');

  if (state.selectedBets[key]) {
    delete state.selectedBets[key];
    event.currentTarget.classList.remove('selected');
    toast('❌ Bet removed');
  } else {
    const fixture = state.fixtures.find(f => f.id === fixtureId);
    state.selectedBets[key] = {
      key, fixtureId,
      match: fixture ? `${fixture.home.name} vs ${fixture.away.name}` : 'Match',
      market, value, prob,
    };
    event.currentTarget.classList.add('selected');
    toast('✅ Added to betslip');
  }

  updateBetslipBar();
}

function updateBetslipBar() {
  const count = Object.keys(state.selectedBets).length;
  document.getElementById('betCount').textContent = count;
  document.getElementById('betslipBar').classList.toggle('visible', count > 0);
  const badge = document.getElementById('navBadge');
  badge.textContent = count;
  badge.classList.toggle('show', count > 0);
}

function saveBetslip() {
  const bets = Object.values(state.selectedBets);
  if (bets.length === 0) return;
  haptic.notify('success');

  const slip = {
    id: Date.now(),
    date: new Date().toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' }),
    legs: bets,
    status: 'pending',
  };

  state.savedBetslips.unshift(slip);
  localStorage.setItem('mo_betslips', JSON.stringify(state.savedBetslips));

  // Clear selections
  state.selectedBets = {};
  document.querySelectorAll('.bet-chip.selected').forEach(c => c.classList.remove('selected'));
  updateBetslipBar();
  toast('💾 Betslip saved!');
  renderSaved();
}

// ═══════════════════════════════════════════════════════════════
// AI DEEP ANALYSIS
// ═══════════════════════════════════════════════════════════════
async function requestAIAnalysis(event, fixtureId) {
  event.stopPropagation();
  if (state.aiLoading[fixtureId]) return;
  haptic.impact('light');

  const btn = document.getElementById(`aibtn-${fixtureId}`);
  const spin = document.getElementById(`aispin-${fixtureId}`);
  const panel = document.getElementById(`aipanel-${fixtureId}`);
  if (!btn || !panel) return;

  state.aiLoading[fixtureId] = true;
  btn.classList.add('loading');
  spin.style.display = 'block';
  panel.innerHTML = '<div class="ai-panel-loading">🔍 Analysing match data…</div>';
  panel.classList.add('visible');

  try {
    const data = await fetchAIAnalysis(fixtureId);
    state.aiAnalysis[fixtureId] = data;
    panel.innerHTML = `🤖 <strong>AI Scout:</strong> ${escHtml(data.analysis)}`;
    haptic.notify('success');
  } catch (err) {
    panel.innerHTML = `<span style="color:var(--danger)">AI unavailable — ${err.message}</span>`;
    haptic.notify('error');
  } finally {
    state.aiLoading[fixtureId] = false;
    btn.classList.remove('loading');
    spin.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════════════════════
// AI SCOUT PAGE
// ═══════════════════════════════════════════════════════════════
function buildQuickBtns() {
  document.getElementById('quickBtns').innerHTML = QUICK_QUESTIONS.map(q =>
    `<button class="quick-btn" onclick="useQuickQ('${escAttr(q)}')">${q}</button>`
  ).join('');
}

function useQuickQ(q) {
  document.getElementById('scoutInput').value = q;
  submitScout();
}

async function submitScout() {
  const input = document.getElementById('scoutInput');
  const question = input.value.trim();
  if (!question) return;

  haptic.impact('light');
  const btn = document.getElementById('scoutBtn');
  const spinner = document.getElementById('scoutSpinner');
  const response = document.getElementById('scoutResponse');

  btn.classList.add('loading');
  spinner.style.display = 'block';
  response.className = 'scout-response empty';
  response.textContent = '🔍 Analysing…';

  try {
    const data = await fetchScout(question);
    response.className = 'scout-response';
    response.textContent = data.answer;
    haptic.notify('success');
  } catch (err) {
    response.className = 'scout-response';
    response.innerHTML = `<span style="color:var(--danger)">Scout unavailable: ${escHtml(err.message)}</span>`;
    haptic.notify('error');
  } finally {
    btn.classList.remove('loading');
    spinner.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════════════════════
// SAVED BETSLIPS
// ═══════════════════════════════════════════════════════════════
function renderSaved() {
  const list = document.getElementById('savedList');
  if (state.savedBetslips.length === 0) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-text">No saved betslips yet.<br>Select bets from the Matches tab.</div>
    </div>`;
    return;
  }
  list.innerHTML = state.savedBetslips.map(slip => `
<div class="saved-card">
  <div class="saved-head">
    <div class="saved-title">${slip.legs.length}-Leg Accumulator</div>
    <div class="saved-status">${slip.status === 'pending' ? 'Pending' : '✅ Settled'}</div>
  </div>
  <div class="saved-date">${slip.date}</div>
  <div class="saved-legs">
    ${slip.legs.map(l => `
      <div class="saved-leg">
        <span>${l.match}</span><br>
        <strong>${l.value}</strong>
        <span style="color:var(--accent);margin-left:6px">${l.prob}%</span>
      </div>`).join('')}
  </div>
</div>`).join('');
}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
function navigate(page) {
  haptic.select();
  state.activePage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.getElementById(`nav-${page}`).classList.add('active');
  if (page === 'saved') renderSaved();
}

// ═══════════════════════════════════════════════════════════════
// SECURITY HELPERS
// ═══════════════════════════════════════════════════════════════
function escHtml(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  return String(str ?? '').replace(/'/g,"\\'");
}
